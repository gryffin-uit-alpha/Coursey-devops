name: Backend CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "back-end/**"
      - "helm-charts/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch:
    inputs:
      force_rebuild_all:
        description: "Force rebuild all services"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  security-events: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  ECR_REPO_PREFIX: ${{ vars.ECR_REPO_PREFIX || 'coursey' }}

jobs:
  changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      php: ${{ steps.filter.outputs.php }}
      python: ${{ steps.filter.outputs.python }}
      nginx: ${{ steps.filter.outputs.nginx }}
      mysql: ${{ steps.filter.outputs.mysql }}
      any_service: ${{ steps.matrix.outputs.any_service }}
      matrix: ${{ steps.matrix.outputs.services }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect Changed Paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            php:    [ 'back-end/php/**', 'back-end/app/**' ]
            python: [ 'back-end/python/**' ]
            nginx:  [ 'back-end/nginx/**', 'back-end/app/public/**' ]
            mysql:  [ 'back-end/mysql/**' ]
            shared: [ 'back-end/.env*', 'back-end/docker-compose.yml', '.github/workflows/backend.yml' ]

      - name: Build Dynamic Matrix
        id: matrix
        run: |
          FORCE="${{ github.event.inputs.force_rebuild_all }}"
          SHARED="${{ steps.filter.outputs.shared }}"

          services=()

          # Logic: Build all if forced or shared files changed. Otherwise, build only changed.
          if [[ "$FORCE" == "true" || "$SHARED" == "true" ]]; then
            services=("php" "python" "nginx" "mysql")
          else
            [[ "${{ steps.filter.outputs.php }}" == "true" ]] && services+=("php")
            [[ "${{ steps.filter.outputs.python }}" == "true" ]] && services+=("python")
            [[ "${{ steps.filter.outputs.nginx }}" == "true" ]] && services+=("nginx")
            [[ "${{ steps.filter.outputs.mysql }}" == "true" ]] && services+=("mysql")
          fi

          if [ ${#services[@]} -eq 0 ]; then
            echo "any_service=false" >> $GITHUB_OUTPUT
            echo "services=[]" >> $GITHUB_OUTPUT
          else
            echo "any_service=true" >> $GITHUB_OUTPUT
            # Elegantly convert bash array to JSON array
            echo "services=$(printf '%s\n' "${services[@]}" | jq -R . | jq -s -c .)" >> $GITHUB_OUTPUT
          fi

  sonar:
    name: Code Quality Scan
    needs: changes
    if: needs.changes.outputs.any_service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Run SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_BACKEND }}
        with:
          projectBaseDir: .
          args: >
            -Dproject.settings=sonar-backend.properties
            -Dsonar.organization=${{ vars.SONAR_ORG }}

  build:
    name: Build & Push
    needs: [changes, sonar]
    if: needs.changes.outputs.any_service == 'true'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.sha_short }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate Image Tag
        id: tag
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./back-end
          file: ./back-end/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}/${{ matrix.service }}:${{ steps.tag.outputs.sha_short }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}/${{ matrix.service }}:latest

      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}/${{ matrix.service }}:${{ steps.tag.outputs.sha_short }}"
          format: "sarif"
          output: "trivy-results-${{ matrix.service }}.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "0"

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results-${{ matrix.service }}.sarif"
          category: trivy-${{ matrix.service }}

  deploy:
    name: Deploy to EKS
    needs: [changes, build]
    if: always() && needs.changes.outputs.any_service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR & Update Kubeconfig
        id: aws-setup
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
          echo "registry=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_OUTPUT

      - name: Generate Helm Values File
        env:
          REGISTRY: ${{ steps.aws-setup.outputs.registry }}
          TAG: ${{ needs.build.outputs.image_tag || github.sha }}
          DOMAIN: ${{ vars.DOMAIN_NAME }}
          CERT_ARN: ${{ secrets.ACM_CERTIFICATE_ARN }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        run: |
          cat <<EOF > deploy-values.yaml
          php:
            image:
              repository: $REGISTRY/${{ env.ECR_REPO_PREFIX }}/php
              tag: "$( [[ "${{ needs.changes.outputs.php }}" == "true" ]] && echo $TAG || echo 'latest' )"
          python:
            image:
              repository: $REGISTRY/${{ env.ECR_REPO_PREFIX }}/python
              tag: "$( [[ "${{ needs.changes.outputs.python }}" == "true" ]] && echo $TAG || echo 'latest' )"
          nginx:
            image:
              repository: $REGISTRY/${{ env.ECR_REPO_PREFIX }}/nginx
              tag: "$( [[ "${{ needs.changes.outputs.nginx }}" == "true" ]] && echo $TAG || echo 'latest' )"
          mysql:
            image:
              repository: $REGISTRY/${{ env.ECR_REPO_PREFIX }}/mysql
              tag: "$( [[ "${{ needs.changes.outputs.mysql }}" == "true" ]] && echo $TAG || echo 'latest' )"

          appConfig:
            apiBaseUrl: "https://api.$DOMAIN"

          secrets:
            hostName: "$DOMAIN"
            mysqlRootPassword: "$MYSQL_ROOT_PASSWORD"
            mysqlUser: "$MYSQL_USER"
            mysqlPassword: "$MYSQL_PASSWORD"
            mailUsername: "$MAIL_USERNAME"
            passApp: "$MAIL_PASSWORD"
            
          ingress:
            alb:
              certificateArn: "$CERT_ARN"
            hosts:
              - name: api
                host: "api.$DOMAIN"
                serviceName: nginx-service
                port: 80
              - name: admin
                host: "admin.$DOMAIN"
                serviceName: nginx-service
                port: 8082
          EOF

          echo "Generated deploy-values.yaml:"
          cat deploy-values.yaml

      - name: Deploy with Helm
        run: |
          helm upgrade --install coursey ./helm-charts/coursey-backend/ \
            --namespace default \
            -f deploy-values.yaml \
            --timeout 5m \
            --wait
